<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="calculator">
    <div id="screen" class="screen">0</div>

    <div class="row g-2">
      
      <div class="col-3"><button class="btn btn-danger" onclick="clearScreen()">C</button></div>
      <div class="col-3"><button class="btn btn-secondary" onclick="addValue('/')">÷</button></div>
      <div class="col-3"><button class="btn btn-secondary" onclick="addValue('*')">×</button></div>
      <div class="col-3"><button class="btn btn-secondary" onclick="addValue('-')">−</button></div>

      <div class="col-3"><button class="btn btn-light" onclick="addValue('7')">7</button></div>
      <div class="col-3"><button class="btn btn-light" onclick="addValue('8')">8</button></div>
      <div class="col-3"><button class="btn btn-light" onclick="addValue('9')">9</button></div>
      <div class="col-3"><button class="btn btn-secondary" onclick="addValue('+')">+</button></div>

      
      <div class="col-3"><button class="btn btn-light" onclick="addValue('4')">4</button></div>
      <div class="col-3"><button class="btn btn-light" onclick="addValue('5')">5</button></div>
      <div class="col-3"><button class="btn btn-light" onclick="addValue('6')">6</button></div>
      <div class="col-3"><button class="btn btn-success" onclick="calculate()">=</button></div>

      
      <div class="col-4"><button class="btn btn-light" onclick="addValue('1')">1</button></div>
      <div class="col-4"><button class="btn btn-light" onclick="addValue('2')">2</button></div>
      <div class="col-4"><button class="btn btn-light" onclick="addValue('3')">3</button></div>

      
      <div class="col-12"><button class="btn btn-light" onclick="addValue('0')">0</button></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
